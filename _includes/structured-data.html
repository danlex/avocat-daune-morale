<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": ["LegalService", "Attorney"],
  "@id": "{{ site.url }}/#cabinet",
  "name": "{{ site.contact.name }}",
  "description": "{{ site.description | strip_newlines | strip }}",
  "url": "{{ site.url }}/",
  "logo": "{{ site.url }}{{ site.logo }}",
  "image": "{{ site.url }}{{ site.logo }}",
  "telephone": "{{ site.contact.phone_href }}",
  "email": "{{ site.contact.email }}",
  "currenciesAccepted": "RON, EUR",
  "knowsLanguage": ["ro", "en", "es"],
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "{{ site.geo.street }}",
    "postalCode": "{{ site.geo.postal }}",
    "addressLocality": "{{ site.geo.locality }}",
    "addressRegion": "{{ site.geo.region_name }}",
    "addressCountry": "{{ site.geo.country }}"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": {{ site.geo.latitude }},
    "longitude": {{ site.geo.longitude }}
  },
  "hasMap": "{{ site.contact.maps_url }}",
  "areaServed": [{% for a in site.geo.area_served %}{ "@type": "AdministrativeArea", "name": "{{ a }}" }{% unless forloop.last %}, {% endunless %}{% endfor %}],
  "knowsAbout": [{% for k in site.knows_about %}"{{ k }}"{% unless forloop.last %}, {% endunless %}{% endfor %}],
  "founder": {
    "@type": "Person",
    "name": "Ion Vărzaru",
    "jobTitle": "Avocat",
    "knowsLanguage": ["ro", "en", "es"],
    "memberOf": { "@type": "Organization", "name": "Baroul București" },
    "alumniOf": [
      { "@type": "CollegeOrUniversity", "name": "Facultatea de Drept" },
      { "@type": "EducationalOrganization", "name": "Institutul Național pentru Pregătirea și Perfecționarea Avocaților" }
    ]
  },
  "employee": [
    { "@type": "Person", "name": "Ion Vărzaru", "jobTitle": "Avocat" },
    { "@type": "Person", "name": "Maria Moraru", "jobTitle": "Avocat" },
    { "@type": "Person", "name": "Ștefania Ruxandra Baranga", "jobTitle": "Avocat" }
  ],
  "sameAs": [
    {% for s in site.same_as %}"{{ s }}",
    {% endfor %}"{{ site.social.linkedin }}",
    "{{ site.social.instagram }}",
    "{{ site.social.facebook }}"
  ]
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Am dreptul să primesc daune morale pentru un accident petrecut pe trecerea de pietoni?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Daunele se împart în daune materiale (acordate numai în măsura dovedirii lor) și daune morale. Pe lângă dreptul de a recupera sumele cheltuite, aveți și dreptul la o reparație morală a suferinței. „Prejudiciul moral constând în suferințe de ordin psihic” justifică acordarea unor compensații materiale pentru victima unui accident, cu rolul de a echilibra suferința experimentată."
      }
    },
    {
      "@type": "Question",
      "name": "Dacă în urma unui accident o persoană a suferit personal vătămări, dar a și pierdut o rudă apropiată, ce daune morale va primi?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Persoana vătămată este îndreptățită să primească daune morale atât pentru vătămarea suferită, cât și pentru suferința cauzată de pierderea rudei apropiate. Daunele morale în acest caz se cumulează."
      }
    },
    {
      "@type": "Question",
      "name": "Dacă într-un accident a decedat sora unei persoane, poate aceasta obține daune morale alături de copiii celei decedate?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Da. Conform art. 1391 Cod civil, instanța poate acorda despăgubiri ascendenților, descendenților, fraților, surorilor și soțului pentru durerea încercată prin moartea victimei. Atât copiii, cât și fratele sau sora celei decedate pot solicita daune morale."
      }
    },
    {
      "@type": "Question",
      "name": "Daunele morale se împart între soția celui decedat și copiii săi?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Nu. Daunele morale se acordă în mod individual, ca preț al suferinței proprii, și nu determină scăderea cuantumului pentru celelalte persoane îndreptățite. Fiecare persoană îndreptățită le primește individual, nu ca o parte dintr-un întreg care se împarte către mai mulți."
      }
    }
  ]
}
</script>
